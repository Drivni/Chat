version: "3"

services:
  alice:
    image: python:3.11-slim
    volumes:
      - .:/app
    working_dir: /app
    network_mode: host
    stdin_open: true
    tty: true
    command: python chat.py 127.0.0.1 Alice

  bob:
    image: python:3.11-slim
    volumes:
      - .:/app
    working_dir: /app
    network_mode: host
    stdin_open: true
    tty: true
    command: python chat.py 127.0.0.2 Bob

  carol:
    image: python:3.11-slim
    volumes:
      - .:/app
    working_dir: /app
    network_mode: host
    stdin_open: true
    tty: true
    command: python chat.py 127.0.0.3 Carol
